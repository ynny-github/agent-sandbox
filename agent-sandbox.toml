  [server]
  output_dir = "./tmp/agent-sandbox"

  [sandbox]
  build_context = "./docker/sandbox"
  dockerfile = "Dockerfile"
  image = "sandbox:0.1.0"

  [allow_patterns]
  patterns = [
    "git *",
    "go *",
  ]

  [deny_patterns]
  patterns = [
    "go run *",
  ]

  [nono]
  profile = "nono.json"
